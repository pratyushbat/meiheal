<div class="bg-gray-50 pt-16 xs:pt-16">
  @if (blogCatPag(); as blogCP) {
    <div class="container mx-auto max-w-7xl px-4">
      <a [routerLink]="['/blogs']" class="back-link"> &larr; Back to all categories </a>
      <!-- Category Header -->
      <div class="mb-12 rounded-3xl bg-gradient-to-r from-green-600 to-emerald-500 p-8 text-white">
        <h1 class="text-3xl font-bold md:text-5xl">
          {{ blogCP?.category?.name }}
        </h1>

        <p class="mt-4 max-w-3xl text-lg text-green-50">
          {{ blogCP?.category?.description }}
        </p>
      </div>

      <!-- Posts -->
      <div *ngIf="blogCP?.posts?.length; else noPosts">
        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          @for (blog of blogCP.posts; track blog._id) {
            <article
              class="group overflow-hidden rounded-2xl bg-white shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl"
            >
              <!-- Image -->
              <div class="overflow-hidden">
                <img
                  loading="lazy"
                  [src]="blogCP?.category?.image"
                  [alt]="blogCP?.category?.slug"
                  class="h-52 w-full object-cover transition duration-500 group-hover:scale-105"
                />
              </div>

              <!-- Content -->
              <div class="p-6">
                <span
                  class="mb-3 inline-block rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-700"
                >
                  {{ blogCP?.category?.name }}
                </span>

                <h2 class="mb-3 line-clamp-2 text-xl font-bold text-gray-900">
                  {{ blog.title }}
                </h2>

                <p class="mb-5 line-clamp-3 text-sm leading-6 text-gray-600">
                  {{ blog.content }}
                </p>

                <a
                  [routerLink]="['/blogs', blogCP?.category?.slug, blog.slug]"
                  class="inline-flex items-center font-semibold text-green-600 hover:text-green-700"
                >
                  Read Article →
                </a>
              </div>
            </article>
          }
        </div>
      </div>

      <ng-template #noPosts>
        <div class="rounded-2xl border border-dashed border-gray-300 bg-white p-10 text-center">
          <p class="text-gray-500">No articles found in this category.</p>
        </div>
      </ng-template>

      <!-- Pagination -->
      <div *ngIf="totalPages > 1" class="mt-12 flex flex-wrap justify-center gap-2">
        <button
          class="rounded-xl border px-4 py-2 disabled:opacity-40"
          [disabled]="currentPage === 1"
          (click)="changePage(currentPage - 1)"
        >
          Prev
        </button>

        <button
          *ngFor="let page of pageNumbers"
          (click)="changePage(page)"
          class="h-10 w-10 rounded-xl border font-medium"
          [ngClass]="{
            'bg-green-600 text-white border-green-600': currentPage === page,
            'bg-white hover:bg-gray-100': currentPage !== page,
          }"
        >
          {{ page }}
        </button>

        <button
          class="rounded-xl border px-4 py-2 disabled:opacity-40"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)"
        >
          Next
        </button>
      </div>
    </div>
  }
</div>
