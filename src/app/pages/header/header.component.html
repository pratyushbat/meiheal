<div class="announcement-bar" *ngIf="announcementText">
  <div class="announcement-content">
    <span>{{ announcementText }}</span>
  </div>
</div>

<!-- Spacer that appears once the header goes fixed, to prevent layout jump -->
<div class="sticky-spacer" *ngIf="isSticky()"></div>

<header class="main-header" [class.is-sticky]="isSticky()">
  <div class="header-container">
    <button
      class="mobile-menu-toggle"
      (click)="openMobileMenu()"
      aria-label="Open menu"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="header-left-group">
      <div class="logo-section">
        <a routerLink="/">
          <img [src]="logoUrl" [alt]="logoAlt" loading="lazy" />
        </a>
      </div>

      <div class="nav-section">
        <nav>
          <ul class="main-nav">
            <li class="nav-item" *ngIf="categories.length">
              <a href="#" class="nav-link" (click)="$event.preventDefault()">Categories</a>

              <div class="mega-menu">
                <div class="mega-menu-container">
                  <div class="mega-menu-grid">
                    <a
                      *ngFor="let category of categories"
                      [routerLink]="category.url"
                      class="category-item"
                    >
                      <div class="category-image">
                        <img [src]="category.image" [alt]="category.name" loading="lazy" />
                      </div>
                      <span class="category-name">{{ category.name }}</span>
                    </a>
                  </div>
                </div>
              </div>
            </li>

            <li class="nav-item">
              <a routerLink="/about-us" class="nav-link">Our Story</a>
            </li>

            <li class="nav-item">
              <a routerLink="/warranty-registration" class="nav-link">Register for Warranty</a>
            </li>

            <li class="nav-item" *ngIf="moreLinks.length">
              <a href="#" class="nav-link" (click)="$event.preventDefault()">
                More
                <span class="dropdown-arrow">
                  <svg viewBox="0 0 100 60" aria-hidden="true">
                    <path d="M10 10 L50 50 L90 10" />
                  </svg>
                </span>
              </a>

              <div class="simple-dropdown">
                <a
                  *ngFor="let link of moreLinks"
                  [routerLink]="!link.external ? link.url : null"
                  [href]="link.external ? link.url : null"
                  [target]="link.external ? '_blank' : undefined"
                  class="dropdown-link"
                >
                  {{ link.label }}
                </a>
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    <div class="header-right-group">
      <div class="search-bar">
        <form class="search-form" #searchForm="ngForm" (ngSubmit)="onSearchSubmit(searchInput.value)">
          <input
            #searchInput
            type="search"
            name="q"
            class="search-input"
            placeholder="Search"
            aria-label="Search"
          />
          <button type="submit" class="search-icon" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </form>
      </div>

      <div class="action-icons">
        <a routerLink="/wishlist" class="icon-link icon-wishlist" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16.5429 4C13.4999 4 12 6.99984 12 6.99984C12 6.99984 10.5001 4 7.45712 4C4.98412 4 3.02579 6.06895 3.00048 8.53772C2.94892 13.6623 7.06573 17.3066 11.5782 20.3693C11.7026 20.4539 11.8495 20.4992 12 20.4992C12.1505 20.4992 12.2975 20.4539 12.4219 20.3693C16.9338 17.3066 21.0506 13.6623 20.9995 8.53772C20.9742 6.06895 19.0159 4 16.5429 4Z" />
          </svg>
        </a>

        <a routerLink="/account" class="icon-link icon-account" aria-label="Account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c1-4 5-6 8-6s7 2 8 6"></path>
          </svg>
        </a>

        <a href="#" class="icon-link cart-trigger" aria-label="Cart" (click)="openCart($event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 10h20l-4 11H6L2 10Zm14-3a4 4 0 0 0-8 0" />
          </svg>
          <span class="cart-count" *ngIf="cart?.totalItems() > 0">{{ cart?.totalItems() }}</span>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- Mobile drawer -->
<div class="mobile-overlay" [class.active]="mobileMenuOpen()" (click)="closeMobileMenu()"></div>

<div class="mobile-drawer" [class.active]="mobileMenuOpen()">
  <button class="mobile-close" (click)="closeMobileMenu()" aria-label="Close menu">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <nav>
    <ul class="mobile-nav">
      <li class="mobile-nav-item" *ngIf="categories.length">
        <button class="mobile-category-toggle" (click)="toggleMobileCategories()">
          Categories
          <svg viewBox="0 0 100 60" width="18" height="12" aria-hidden="true">
            <path
              d="M10 10 L50 50 L90 10"
              fill="none"
              stroke="currentColor"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              [attr.transform]="mobileCategoriesOpen() ? 'rotate(180 50 30)' : null"
            />
          </svg>
        </button>

        <div class="mobile-category-list" [class.active]="mobileCategoriesOpen()">
          <a
            *ngFor="let category of categories"
            [routerLink]="category.url"
            class="mobile-category-link"
            (click)="closeMobileMenu()"
          >
            <div class="mobile-category-img">
              <img [src]="category.image" [alt]="category.name" loading="lazy" />
            </div>
            <span>{{ category.name }}</span>
          </a>
        </div>
      </li>

      <li class="mobile-nav-item">
        <a routerLink="/about-us" class="mobile-nav-link" (click)="closeMobileMenu()">Our Story</a>
      </li>

      <li class="mobile-nav-item">
        <a routerLink="/warranty-registration" class="mobile-nav-link" (click)="closeMobileMenu()">
          Register for Warranty
        </a>
      </li>

      <li class="mobile-nav-item" *ngIf="moreLinks.length">
        <button class="mobile-more-toggle" (click)="toggleMobileMore()">
          More
          <svg viewBox="0 0 100 60" width="18" height="12" aria-hidden="true">
            <path
              d="M10 10 L50 50 L90 10"
              fill="none"
              stroke="currentColor"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              [attr.transform]="mobileMoreOpen() ? 'rotate(180 50 30)' : null"
            />
          </svg>
        </button>

        <div class="mobile-more-list" [class.active]="mobileMoreOpen()">
          <a
            *ngFor="let link of moreLinks"
            [routerLink]="!link.external ? link.url : null"
            [href]="link.external ? link.url : null"
            [target]="link.external ? '_blank' : undefined"
            class="mobile-more-link"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        </div>
      </li>
    </ul>
  </nav>

  <div class="mobile-icon-links">
    <a routerLink="/wishlist" class="icon-link" aria-label="Wishlist" (click)="closeMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M16.5429 4C13.4999 4 12 6.99984 12 6.99984C12 6.99984 10.5001 4 7.45712 4C4.98412 4 3.02579 6.06895 3.00048 8.53772C2.94892 13.6623 7.06573 17.3066 11.5782 20.3693C11.7026 20.4539 11.8495 20.4992 12 20.4992C12.1505 20.4992 12.2975 20.4539 12.4219 20.3693C16.9338 17.3066 21.0506 13.6623 20.9995 8.53772C20.9742 6.06895 19.0159 4 16.5429 4Z" />
      </svg>
    </a>

    <a routerLink="/account" class="icon-link" aria-label="Account" (click)="closeMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c1-4 5-6 8-6s7 2 8 6"></path>
      </svg>
    </a>
  </div>
</div>
