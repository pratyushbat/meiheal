<div class="flex items-center justify-center bg-gray-50 px-4 pt-10 xs:pt-10">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8 text-center">
    <!-- Success Icon -->
    <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="180"
        height="180"
        viewBox="0 0 180 180"
        fill="none"
      >
        <!-- Background Circle -->
        <circle cx="90" cy="90" r="80" fill="#FEE2E2" />

        <!-- Credit Card -->
        <rect
          x="45"
          y="58"
          width="90"
          height="58"
          rx="8"
          fill="#FFFFFF"
          stroke="#CBD5E1"
          stroke-width="2"
        />
        <rect x="45" y="68" width="90" height="10" fill="#E5E7EB" />
        <rect x="58" y="92" width="22" height="6" rx="3" fill="#CBD5E1" />
        <rect x="88" y="92" width="32" height="6" rx="3" fill="#CBD5E1" />

        <!-- Failed Badge -->
        <circle cx="122" cy="118" r="20" fill="#EF4444" />
        <path
          d="M115 111L129 125M129 111L115 125"
          stroke="white"
          stroke-width="4"
          stroke-linecap="round"
        />
      </svg>
    </div>

    <!-- Title -->
    <h1 class="mt-6 text-2xl font-bold text-gray-800">Payment Failed 🎉</h1>

    <!-- Message -->
    <p class="mt-3 text-gray-600">
      Thank you for your purchase. Your payment has been processed successfully.
    </p>

    <!-- Order Info -->
    <div class="mt-6 border transition p-4 text-left bg-gray-50">
      <div class="flex justify-between text-sm text-gray-700">
        <span>Order ID</span>
        <span class="font-medium">asdas<!-- {{ orderId }} --></span>
      </div>
      <div class="flex justify-between text-sm text-gray-700 mt-2">
        <span>Amount Paid</span>
        <span class="font-medium">₹<!-- {{ amount }} --></span>
      </div>
      <div class="flex justify-between text-sm text-gray-700 mt-2">
        <span>Payment Method</span>
        <span class="font-medium">PhonePe</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-8 flex flex-col gap-3">
      <button
        [routerLink]="'/home/orders'"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 transition transition"
      >
        View My Orders
      </button>

      <button
        [routerLink]="'/home'"
        class="w-full border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-3 transition transition"
      >
        Continue Shopping
      </button>
    </div>
  </div>
</div>
