<div *ngIf="type != 'verifyPwd'" class="setup-container" pt-16 xs:pt-16>
  <h2>Upgrade Your Account</h2>
  <p>Please set a password to complete your account setup.</p>

  <div *ngIf="errorMessage" class="error-alert">
    {{ errorMessage }}
  </div>

  <form [formGroup]="setupForm" (ngSubmit)="onSubmit()" *ngIf="token">
    <div class="form-group">
      <label for="password">New Password</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="Enter at least 8 characters"
      />

      <div
        class="error-text"
        *ngIf="
          setupForm.get('password')?.touched && setupForm.get('password')?.hasError('required')
        "
      >
        Password is required.
      </div>
      <div
        class="error-text"
        *ngIf="
          setupForm.get('password')?.touched && setupForm.get('password')?.hasError('minlength')
        "
      >
        Password must be at least 8 characters.
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        type="password"
        id="confirmPassword"
        formControlName="confirmPassword"
        placeholder="Re-enter your password"
      />

      <div
        class="error-text"
        *ngIf="setupForm.get('confirmPassword')?.touched && setupForm.hasError('mismatch')"
      >
        Passwords do not match.
      </div>
    </div>

    <button type="submit" [disabled]="setupForm.invalid || isLoading">
      {{ isLoading ? 'Saving...' : 'Set Password & Continue' }}
    </button>
  </form>
</div>
